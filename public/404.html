<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost in the Storm — Operation Toofan</title>
  <meta name="robots" content="noindex" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .glyph { font-size: 72px; margin-bottom: 24px; }
    h1 { font-size: 28px; font-weight: 700; color: #f0b429; margin-bottom: 12px; }
    p { font-size: 16px; color: #a0a0b0; max-width: 400px; line-height: 1.6; margin-bottom: 28px; }
    a {
      display: inline-block;
      background: #f0b429;
      color: #0a0a1a;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
    a:focus-visible { outline: 3px solid #f0b429; outline-offset: 3px; }
  </style>
</head>
<body>
  <div class="glyph" aria-hidden="true">⚡</div>
  <h1>Lost in the Storm</h1>
  <p>The shadow claimed this path. The page you seek does not exist — but your oath still awaits.</p>
  <a href="/">Return to the Order</a>
</body>
</html>
